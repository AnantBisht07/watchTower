name: Bug Report
description: Something is broken or behaving unexpectedly
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Fill in as much detail as you can — a clear reproduction is the fastest path to a fix.

  - type: input
    id: version
    attributes:
      label: MCP Watchtower version
      description: Output of `pip show mcp-watchtower` or the git commit SHA
      placeholder: "0.1.0 / commit abc1234"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS
        - Linux
        - Windows
    validations:
      required: true

  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: "3.12.2"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
      description: A script or sequence of steps that reliably triggers the bug.
      render: python
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Error output / stack trace
      render: text
    validations:
      required: false
