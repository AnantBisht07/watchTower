name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Before opening a request, check the [improvement plan](../blob/main/docs/improvement_plan.md) — your idea may already be on the roadmap.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the situation where this feature would help.
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What should the feature do? Include API sketches or UI mockups if helpful.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What workarounds or other approaches did you consider?
    validations:
      required: false

  - type: dropdown
    id: contribution
    attributes:
      label: Are you willing to contribute this?
      options:
        - "Yes — I can open a PR"
        - "Maybe — I could help with guidance"
        - "No — just a suggestion"
    validations:
      required: true
