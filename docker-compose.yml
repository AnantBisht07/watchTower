services:
  watchtower:
    build: .
    ports:
      - "8123:8000"
    volumes:
      - watchtower_data:/data
    environment:
      - WATCHTOWER_DB_PATH=/data/watchtower.db
      # Optional: set to enable API token auth
      # - WATCHTOWER_API_TOKEN=your-secret-token

volumes:
  watchtower_data:
